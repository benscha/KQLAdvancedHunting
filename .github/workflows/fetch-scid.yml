# .github/workflows/fetch-scid.yml
name: Fetch SCID CSV

on:
  schedule:
    - cron: '0 6 * * 1'  # Jeden Montag 06:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Export SCID CSV
        run: node .github/workflows/fetch-scid.js

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add MISC/scid.csv
          git diff --staged --quiet || git commit -m "chore: update SCID CSV"
          git push
