steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: GitHub Traffic Archive
        # Wir nutzen hier eine sehr stabile Version eines anderen Entwicklers
        # oder den korrigierten Pfad, falls vorhanden.
        uses: sangonzalezplus/github-traffic-archiver@v1.7.0
        env:
          PAT: ${{ secrets.GHTRAFFICToken }}
          USERNAME: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
