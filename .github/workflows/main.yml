name: Traffic Archive
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch & save traffic data
        env:
          GH_TOKEN: ${{ secrets.GHTRAFFICToken }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p traffic

          # Views abrufen
          VIEWS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/views")

          # Clones abrufen
          CLONES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/clones")

          # Referrers abrufen (Top 10 Quellen)
          REFERRERS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/popular/referrers")

          # Alles zusammenführen und speichern
          jq -n \
            --arg date "$DATE" \
            --argjson views "$VIEWS" \
            --argjson clones "$CLONES" \
            --argjson referrers "$REFERRERS" \
            '{date: $date, views: $views, clones: $clones, referrers: $referrers}' \
            > "traffic/$DATE.json"

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/
          git diff --cached --quiet || git commit -m "chore: traffic archive $(date +%Y-%m-%d)"
          git push
