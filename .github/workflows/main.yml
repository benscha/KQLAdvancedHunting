name: Traffic Archive
on:
  schedule:
    - cron: '21 * * * *'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch & save traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p traffic

          VIEWS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/views")

          CLONES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/clones")

          REFERRERS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/popular/referrers")

          jq -n \
            --arg date "$DATE" \
            --argjson views "$VIEWS" \
            --argjson clones "$CLONES" \
            --argjson referrers "$REFERRERS" \
            '{date: $date, views: $views, clones: $clones, referrers: $referrers}' \
            > "traffic/$DATE.json"

      - name: Push to private stats repo
        env:
          TRAFFIC_PAT: ${{ secrets.TRAFFIC_PAT }}
        run: |
          # Privates Repo auschecken
          git clone https://x-access-token:$TRAFFIC_PAT@github.com/benscha/stats.git stats-repo

          # Daten kopieren
          cp traffic/*.json stats-repo/traffic/ 2>/dev/null || true
          mkdir -p stats-repo/traffic
          cp traffic/*.json stats-repo/traffic/

          # Committen und pushen
          cd stats-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/
          git diff --cached --quiet || git commit -m "chore: traffic archive $(date +%Y-%m-%d)"
          git push
